	<script>
		(function() {
			const CDN = "https://cdn.jsdelivr.net/gh/UGBONTOP/webdasherssinglefilev2@main";

			function rewrite(url) {
				if (typeof url !== "string") return url;
				// Match relative paths like "assets/..." or absolute file:// paths containing /assets/
				const m = url.match(/(?:^|.*[\/\\])(assets\/.+)/);
				if (m) return CDN + "/" + m[1];
				return url;
			}
			const _open = XMLHttpRequest.prototype.open;
			XMLHttpRequest.prototype.open = function(method, url, ...rest) {
				return _open.call(this, method, rewrite(url), ...rest);
			};

			const _fetch = window.fetch;
			window.fetch = function(input, init) {
				if (typeof input === "string") {
					input = rewrite(input);
				} else if (input instanceof Request) {
					const newUrl = rewrite(input.url);
					if (newUrl !== input.url) input = new Request(newUrl, input);
				}
				return _fetch.call(this, input, init);
			};

			const _imgDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
			Object.defineProperty(HTMLImageElement.prototype, "src", {
				set(val) { _imgDesc.set.call(this, rewrite(val)); },
				get() { return _imgDesc.get.call(this); }
			});

		})();
	</script>
